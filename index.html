<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Minimal Slider</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="slider-wrapper">
        <div class="slides-container" id="slides">
            <div class="slide-item"><img
                    src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1000&q=80"
                    alt="Nature 1"></div>
            <div class="slide-item"><img
                    src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?auto=format&fit=crop&w=1000&q=80"
                    alt="Nature 2"></div>
            <div class="slide-item"><img
                    src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1000&q=80"
                    alt="Nature 3"></div>
            <div class="slide-item"><img
                    src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&w=1000&q=80"
                    alt="Nature 4"></div>
        </div>

        <button class="nav-btn prev-btn" aria-label="Previous">&#10094;</button>
        <button class="nav-btn next-btn" aria-label="Next">&#10095;</button>

        <div class="pagination" id="pagination"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
